name: Deploy Sayori Blog

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [content-updated]
  workflow_dispatch:

concurrency:
  group: sayori-blog-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_BROWSER_RENDERING_API_TOKEN: ${{ secrets.CF_BROWSER_RENDERING_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: Amiyadesi/sayori-articles
          ref: main
          path: content
      - name: Check Cloudflare secrets
        id: cloudflare
        shell: bash
        run: |
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID}" || -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "::error::Cloudflare deploy secrets missing. Add CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN repository secrets."
            exit 1
          fi
          echo "ready=true" >> "${GITHUB_OUTPUT}"
      - uses: pnpm/action-setup@v4
        if: steps.cloudflare.outputs.ready == 'true'
        with:
          version: 11.1.3
          run_install: false
      - uses: actions/setup-node@v6
        if: steps.cloudflare.outputs.ready == 'true'
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        if: steps.cloudflare.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile
      - name: Sync and verify
        if: steps.cloudflare.outputs.ready == 'true'
        env:
          CONTENT_DIR: ./content
        run: |
          pnpm run sync-content
          pnpm run check
          pnpm run build
          pnpm run verify-build-output
      - name: Apply D1 migrations
        if: steps.cloudflare.outputs.ready == 'true'
        run: npx --yes wrangler@latest d1 migrations apply sayori-analytics --remote
      - name: Configure screenshot secret
        if: steps.cloudflare.outputs.ready == 'true' && env.CF_BROWSER_RENDERING_API_TOKEN != ''
        run: |
          secret_file="${RUNNER_TEMP}/sayori-blog-pages-secrets.json"
          node --input-type=module - "${secret_file}" <<'NODE'
          import fs from 'node:fs';
          fs.writeFileSync(process.argv[2], JSON.stringify({
            CF_ACCOUNT_ID: process.env.CLOUDFLARE_ACCOUNT_ID,
            CF_API_TOKEN: process.env.CF_BROWSER_RENDERING_API_TOKEN,
          }), { mode: 0o600 });
          NODE
          npx --yes wrangler@latest pages secret bulk "${secret_file}" --project-name sayori-blog
          rm -f "${secret_file}"
      - name: Deploy Pages
        if: steps.cloudflare.outputs.ready == 'true'
        run: >
          npx --yes wrangler@latest pages deploy dist
          --project-name sayori-blog
          --branch main
          --commit-message "Deploy blog.sayori.org from GitHub Actions"
