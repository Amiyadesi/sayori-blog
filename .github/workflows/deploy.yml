name: Verify and Deploy Sayori Blog

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
    types: [content-updated]
  workflow_dispatch:

concurrency:
  group: sayori-blog-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  WRANGLER_VERSION: 4.111.0
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CF_BROWSER_RENDERING_API_TOKEN: ${{ secrets.CF_BROWSER_RENDERING_API_TOKEN }}

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Require main for production events
        if: github.event_name != 'pull_request' && github.ref != 'refs/heads/main'
        run: |
          echo "::error::Production verification and deploy must run from main."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout public content
        uses: actions/checkout@v6
        with:
          repository: Amiyadesi/sayori-articles
          ref: main
          path: content

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Record immutable deployment metadata
        shell: bash
        run: |
          echo "DEPLOYMENT_CODE_SHA=${GITHUB_SHA}" >> "${GITHUB_ENV}"
          echo "DEPLOYMENT_CONTENT_SHA=$(git -C content rev-parse HEAD)" >> "${GITHUB_ENV}"
          echo "DEPLOYMENT_BUILT_AT=$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')" >> "${GITHUB_ENV}"
          echo "DEPLOYMENT_WORKFLOW_RUN=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "${GITHUB_ENV}"

      - name: Sync public content
        env:
          CONTENT_DIR: ./content
        run: pnpm run sync-content

      - name: Run Node tests
        run: pnpm test

      - name: Check and build
        env:
          CONTENT_DIR: ./content
        run: |
          pnpm run check
          pnpm run build
          pnpm run verify-build-output
          node scripts/write-deployment-manifest.mjs dist/deployment.json

      - name: Check production secrets
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          missing=0
          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_API_TOKEN \
            CF_BROWSER_RENDERING_API_TOKEN; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Apply D1 migrations
        if: github.event_name != 'pull_request'
        run: pnpm dlx "wrangler@${WRANGLER_VERSION}" d1 migrations apply sayori-analytics --remote

      - name: Configure screenshot secret
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          secret_file="${RUNNER_TEMP}/sayori-blog-pages-secrets.json"
          node --input-type=module - "${secret_file}" <<'NODE'
          import fs from 'node:fs';
          fs.writeFileSync(process.argv[2], JSON.stringify({
            CF_ACCOUNT_ID: process.env.CLOUDFLARE_ACCOUNT_ID,
            CF_API_TOKEN: process.env.CF_BROWSER_RENDERING_API_TOKEN,
          }), { mode: 0o600 });
          NODE
          pnpm dlx "wrangler@${WRANGLER_VERSION}" pages secret bulk "${secret_file}" --project-name sayori-blog
          rm -f "${secret_file}"

      - name: Deploy Pages
        if: github.event_name != 'pull_request'
        run: >
          pnpm dlx "wrangler@${WRANGLER_VERSION}" pages deploy dist
          --project-name sayori-blog
          --branch main
          --commit-hash "${GITHUB_SHA}"
          --commit-message "Deploy blog.sayori.org from GitHub Actions"

      - name: Verify custom domain
        if: github.event_name != 'pull_request'
        run: node scripts/verify-live-deployment.mjs https://blog.sayori.org
